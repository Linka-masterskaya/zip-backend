name: Build and Push Docker images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Build and push Server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ${{ env.REGISTRY }}/linka-masterskaya/zip-backend/server:latest
            ${{ env.REGISTRY }}/linka-masterskaya/zip-backend/server:sha-${{ steps.sha.outputs.SHORT_SHA }}

      - name: Build and push AI Worker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ai-worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/linka-masterskaya/zip-backend/ai-worker:latest
            ${{ env.REGISTRY }}/linka-masterskaya/zip-backend/ai-worker:sha-${{ steps.sha.outputs.SHORT_SHA }}