# Базовая инфраструктура
# Для локальной разработки

services:
  postgres:
    container_name: local-postgresql
    image: postgres:15-alpine
    restart: unless-stopped
    # если Postgresql уже установлен локально, используй другой порт на хост-машине (например "5433:5432")
    # если меняется порт, не забудь изменить его в DB_URL внутри локального .env
    ports:
      - "5432:5432"
    volumes:
      - local-postgres-volume:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-linka}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-linka}
      - POSTGRES_DB=${DB_NAME:-linka}
    networks:
      - linka-net
    healthcheck:
      # те же переменные по умолчанию для гибкости 
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-linka} -d ${DB_NAME:-linka}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: local-minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000" # порт API
      - "9001:9001" # порт веб-консоли
    volumes:
      - local-minio-volume:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    # запуск сервера MinIO с указанием папки для данных и порта веб-консоли
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      - linka-net
    healthcheck:
      # mc ready local — встроенная утилита проверки готовности дисков MinIO
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    container_name: local-nats
    image: nats:alpine
    restart: unless-stopped
    ports:
      - "4222:4222" # порт приложения
      - "8222:8222" # порт мониторинга
    volumes:
      - local-nats-volume:/data
    # js включает JetStream, -m включает мониторинг, --sd задает папку хранения сообщений
    command: ["-js", "-m", "8222", "--sd", "/data"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linka-net

volumes:
  local-postgres-volume:
  local-minio-volume:
  local-nats-volume:


networks:
  linka-net:
